<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Staff Dashboard — BFFs</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="topbar">
  <a class="brand" href="index.html">BFF<span class="dot">s</span> 💌</a>
  <nav><a href="#" id="logoutLink">Log out</a></nav>
</div>
<div class="bracelet"></div>

<div class="page" style="grid-template-columns: 1fr;">
  <main id="gate">
    <p>Checking access…</p>
  </main>
</div>

<script>
  const main = document.getElementById('gate');

  if (sessionStorage.getItem('bffsLoggedIn') !== 'true') {
    main.innerHTML = `
      <div class="card">
        <h2 style="margin-top:0;">Access denied</h2>
        <p>You need to log in through the staff tools page first.</p>
        <a class="btn" href="portal-9f3k.html">Go to login</a>
      </div>`;
  } else {
    main.innerHTML = `
      <div class="card">
        <h2 style="margin-top:0;">🎉 You're in!</h2>
        <p>You just used a default admin/admin login to access a page that should never have been public.
        In a real app, this same mistake could expose every user's private data.</p>
      </div>

      <div class="stat-box">
        <span class="num">1,842</span>
        Total users signed up to BFFs
      </div>

      <div class="card">
        <h3 style="margin-top:0;">User accounts (sample)</h3>
        <table class="user-table">
          <tr><th>Username</th><th>Full name</th><th>Joined</th></tr>
          <tr><td>jordy.m</td><td>Jordy Martinez</td><td>Feb 2026</td></tr>
          <tr><td>tasha.q</td><td>Tasha Quinn</td><td>Feb 2026</td></tr>
          <tr><td>devin.r</td><td>Devin Reyes</td><td>Mar 2026</td></tr>
          <tr><td>priya.l</td><td>Priya Lalwani</td><td>Mar 2026</td></tr>
          <tr><td>...</td><td>...</td><td>...</td></tr>
        </table>
        <p style="font-size:0.85rem; color:var(--grape-soft); margin-top:12px;">
          As an "admin," you could edit any of these profiles or view private info — which is exactly why
          leaving default credentials in place is dangerous.
        </p>
      </div>
    `;
  }

  document.getElementById('logoutLink').addEventListener('click', function(e) {
    e.preventDefault();
    sessionStorage.removeItem('bffsLoggedIn');
    window.location.href = 'index.html';
  });
</script>

<p class="footer-note">BFFs is a fictional practice site built for a cybersecurity class activity. All names and data here are made up.</p>

</body>
</html>
