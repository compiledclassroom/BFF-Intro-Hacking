<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Staff Tools — BFFs</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="topbar">
  <a class="brand" href="index.html">BFF<span class="dot">s</span> 💌</a>
  <nav>
    <a href="index.html">Home</a>
    <a href="friends.html">Friends</a>
    <a href="notifications.html">Notifications</a>
    <a href="profile.html">Profile</a>
  </nav>
</div>
<div class="bracelet"></div>

<div class="form-wrap card">
  <h2 style="margin-top:0;">Staff Tools Login</h2>
  <p style="color:var(--grape-soft); font-size:0.9rem; margin-top:-6px;">Internal use only. This page was supposed to be taken down before launch.</p>

  <div class="error-msg" id="errorMsg">Incorrect username or password. Try again.</div>

  <form id="loginForm">
    <input type="text" id="username" placeholder="Username" autocomplete="off">
    <input type="password" id="password" placeholder="Password" autocomplete="off">
    <button type="submit" class="btn">Log In</button>
  </form>
</div>

<p class="footer-note">BFFs is a fictional practice site built for a cybersecurity class activity.</p>

<script>
  // NOTE: default credentials were never changed after setup.
  const VALID_USER = "admin";
  const VALID_PASS = "admin";

  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value.trim();
    const err = document.getElementById('errorMsg');

    if (u === VALID_USER && p === VALID_PASS) {
      sessionStorage.setItem('bffsLoggedIn', 'true');
      window.location.href = 'dashboard.html';
    } else {
      err.style.display = 'block';
    }
  });
</script>

</body>
</html>
